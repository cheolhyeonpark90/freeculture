name: FreeCulture 데이터 수집 및 빌드

permissions:
  contents: write  
  pages: write
  id-token: write

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * 3'

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 🛠️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🏃 Run fetch.js
        env:
          FREE_CULTURE_API_KEY: ${{ secrets.FREE_CULTURE_API_KEY }}
        run: node src/fetch.js

      - name: Commit & push data
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add public/freeculture_data.json
          git commit -m "🤖 자동 수집: $(date -u '+%Y-%m-%dT%H:%M:%SZ')" || exit 0
          git push
